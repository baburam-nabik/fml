<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAK_1GcvSa0HzN1hOzpeKjmrEKWqyA3OxA",
        authDomain: "fmlapp-164308.firebaseapp.com",
        databaseURL: "https://fmlapp-164308.firebaseio.com",
        projectId: "fmlapp-164308",
        storageBucket: "fmlapp-164308.appspot.com",
        messagingSenderId: "191414083868",
        appId: "1:191414083868:web:3ff379f63efc397ed91ad9",
        measurementId: "G-CSPSGMKYY0"
    };

    function isMessagingSupported() {
        return 'Notification' in window && 'serviceWorker' in navigator && 'PushManager' in window;
    }

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    let messaging;
    if (isMessagingSupported()) {
        try {
            messaging = firebase.messaging();

            function requestNotificationPermission() {
                return messaging.requestPermission()
                    .then(() => {
                        console.log('✅ Notification permission granted.');
                        return messaging.getToken({
                            vapidKey: 'YOUR_PUBLIC_VAPID_KEY_HERE' // <- REQUIRED for web push
                        });
                    })
                    .then((currentToken) => {
                        if (currentToken) {
                            console.log('🎯 FCM Token:', currentToken);
                            // Send the token to your backend
                        } else {
                            console.warn('⚠️ No registration token available.');
                        }
                    })
                    .catch((err) => {
                        console.error('🚫 Error during permission/token request:', err);
                    });
            }
        } catch (err) {
            console.error("🚨 Messaging init error:", err);
        }
    } else {
        console.warn("⚠️ Firebase Messaging is not supported in this browser.");
    }

    window.addEventListener('load', function () {
        if (messaging && 'serviceWorker' in navigator) {
            navigator.serviceWorker.register('/firebase-messaging-sw.js')
                .then((registration) => {
                    console.log('✅ Service Worker registered:', registration.scope);
                    messaging.useServiceWorker(registration);
                    requestNotificationPermission();
                })
                .catch((error) => {
                    console.error('❌ SW registration failed:', error);
                });
        }

        // Load Flutter app
        _flutter.loader.loadEntrypoint({
            serviceWorker: {
                serviceWorkerVersion: null
            },
            onEntrypointLoaded: function (engineInitializer) {
                engineInitializer.initializeEngine({ renderer: "html" }).then(function (appRunner) {
                    appRunner.runApp();
                });
            }
        });
    });
</script>
