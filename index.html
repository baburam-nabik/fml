<!DOCTYPE html>
<html>
<head>
    <base href="/">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="A new Flutter project.">

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="FML-Food Music Love">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDICPC3V8tUyY8SZ9aCIJD8cw9Vox8EdSs&libraries=places" loading="async" defer></script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">

    <title>FML-Food Music Love</title>
    <link rel="manifest" href="manifest.json">

    <script src="flutter.js" defer></script>
    <script src="flutter_bootstrap.js"></script>

</head>
<body>
<script>
    async function registerServiceWorker(retryCount = 3, delay = 2000) {
        if ('serviceWorker' in navigator) {
            for (let attempt = 1; attempt <= retryCount; attempt++) {
                try {
<!--                    const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');-->
                    console.log(`✅ Service Worker registered (Attempt ${attempt}):`, registration);
<!--                    await navigator.serviceWorker.ready;-->
                    console.log('✅ Service Worker is ready');
                    return;
                } catch (error) {
                    console.error(`❌ Service Worker registration failed (Attempt ${attempt}):`, error);
                    if (attempt < retryCount) {
                        console.log(`🔄 Retrying in ${delay}ms...`);
                        await new Promise(res => setTimeout(res, delay));
                    }
                }
            }
            console.error('🚨 Service Worker registration failed after all attempts.');
        }
    }

    window.addEventListener('load', async function () {
        await registerServiceWorker();
        console.log("🚀 Starting Flutter...");
        _flutter.loader.load({
            serviceWorker: { serviceWorkerVersion: '"2144658888"' },
            onLoad: function (engineInitializer) {
                engineInitializer.initializeEngine({ renderer: "canvaskit" })
                    .then((appRunner) => appRunner.runApp());
            }
        });
    });
</script>
</body>
