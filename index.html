<!DOCTYPE html>
<html>
<head>
    <base href="/" />
    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="Flutter Web App with FCM" />

    <!-- iOS meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="flutter_fcm_web" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-analytics.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-messaging.js"></script>

    <!-- Flutter SDK -->
    <script src="flutter.js" defer></script>

    <script>
        // ✅ Firebase config
        const firebaseConfig = {
          apiKey: "AIzaSyAK_1GcvSa0HzN1hOzpeKjmrEKWqyA3OxA",
          authDomain: "fmlapp-164308.firebaseapp.com",
          databaseURL: "https://fmlapp-164308.firebaseio.com",
          projectId: "fmlapp-164308",
          storageBucket: "fmlapp-164308.appspot.com",
          messagingSenderId: "191414083868",
          appId: "1:191414083868:web:3ff379f63efc397ed91ad9",
          measurementId: "G-CSPSGMKYY0"
        };

        // ✅ Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        firebase.analytics();

        let messaging;

        // ✅ Request FCM token and permissions
        async function requestFCMPermissionAndToken() {
          try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
              console.log('✅ Notification permission granted.');

              const token = await messaging.getToken({
                vapidKey: 'BD5l4A7btFUkfgjSd_K0Yz2BrYJd1nC5xfhrEHnXk7qTif74ltnPghIGe1tSR2ZhdCrQpV1DW8jGMl7t2lzZ73k' // Replace with your VAPID key
              });

              if (token) {
                console.log('🔑 FCM Token:', token);
                // ✅ Send token to your server
              } else {
                console.warn('⚠️ No token returned');
              }
            } else {
              console.warn('❌ Notification permission not granted.');
            }
          } catch (err) {
            console.error('❌ Error getting token:', err);
          }
        }

        // ✅ Check if browser is Safari on iOS
        function isIOS() {
          return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        }

        function isSafari() {
          return /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        }

        window.addEventListener('load', async () => {
          if (isIOS() && isSafari()) {
            alert('❗ Push Notifications are not supported on iOS Safari. Please install our app or use a different browser.');
          }

          if ('serviceWorker' in navigator && 'PushManager' in window) {
            try {
              const registration = await navigator.serviceWorker.register('firebase-messaging-sw.js');
              console.log('✅ Service Worker registered:', registration.scope);

              messaging = firebase.messaging();
              messaging.useServiceWorker(registration);

              await requestFCMPermissionAndToken();
            } catch (err) {
              console.error('❌ Failed to register SW or get FCM token:', err);
            }
          } else {
            console.warn('❗ Browser does not support notifications.');
          }

          // ✅ Load Flutter app
          if (!_flutter.buildConfig) {
            _flutter.buildConfig = {}; // Fix error: _flutter.buildConfig must be set
          }

          _flutter.loader.load({
            serviceWorker: {
              serviceWorkerVersion: null,
            },
            onEntrypointLoaded: function (engineInitializer) {
              engineInitializer.initializeEngine().then(function (appRunner) {
                appRunner.runApp();
              });
            }
          });
        });
    </script>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</body>
</html>
