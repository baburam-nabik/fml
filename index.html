<!DOCTYPE html>
<html>
<head>
    <base href="/" />
    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="Flutter Web App with FCM" />

    <!-- iOS meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="fml_customer_web" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- Firebase SDKs (MUST be loaded BEFORE usage) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-analytics.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-messaging.js"></script>

    <!-- Flutter initialization script -->
    <script src="flutter.js" defer></script>

    <!-- Firebase Initialization -->
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAK_1GcvSa0HzN1hOzpeKjmrEKWqyA3OxA",
          authDomain: "fmlapp-164308.firebaseapp.com",
          databaseURL: "https://fmlapp-164308.firebaseio.com",
          projectId: "fmlapp-164308",
          storageBucket: "fmlapp-164308.appspot.com",
          messagingSenderId: "191414083868",
          appId: "1:191414083868:web:3ff379f63efc397ed91ad9",
          measurementId: "G-CSPSGMKYY0"
        };

        firebase.initializeApp(firebaseConfig);
        firebase.analytics();

        let messaging;

        // Register Service Worker and Setup Messaging
        window.addEventListener('load', async () => {
          if ('serviceWorker' in navigator && 'PushManager' in window) {
            try {
              const registration = await navigator.serviceWorker.register('firebase-messaging-sw.js');
              console.log('✅ Service Worker registered with scope:', registration.scope);

              messaging = firebase.messaging();
              messaging.useServiceWorker(registration);

              try {
                await Notification.requestPermission();
                const token = await messaging.getToken({
                  vapidKey: 'YOUR_PUBLIC_VAPID_KEY' // <-- Replace this with your actual VAPID key from Firebase Console
                });
                if (token) {
                  console.log('🔑 FCM Token:', token);
                  // TODO: Send token to your server
                } else {
                  console.log('⚠️ No FCM token available');
                }
              } catch (err) {
                console.error('❌ Unable to get permission for notifications', err);
              }

            } catch (error) {
              console.error('❌ Service Worker registration failed:', error);
            }
          } else {
            console.warn("❗ This browser doesn't support push notifications.");
          }

          // Load Flutter Web App
          _flutter.loader.loadEntrypoint({
            serviceWorker: {
              serviceWorkerVersion: null,
            },
            onEntrypointLoaded: function (engineInitializer) {
              engineInitializer.initializeEngine().then(function (appRunner) {
                appRunner.runApp();
              });
            }
          });
        });
    </script>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</body>
</html>
