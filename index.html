<!DOCTYPE html>
<html>
<head>
    <base href="/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="A new Flutter project.">

    <!-- iOS meta tags & icons -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FML-Food Music Love">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png"/>

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Google Maps (optional, keep async defer) -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDICPC3V8tUyY8SZ9aCIJD8cw9Vox8EdSs&libraries=places" async defer></script>

    <!-- JS libraries (QR scanner) -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js" defer></script>

    <title>FML-Food Music Love</title>

    <!-- Flutter bootstrap -->
    <script src="flutter.js" defer></script>
    <script>
        const serviceWorkerVersion = "1252329854";
        let useHtml = true;

        window.addEventListener('load', function () {
          _flutter.loader.loadEntrypoint({
            serviceWorker: {
              serviceWorkerVersion: serviceWorkerVersion,
            },
            onEntrypointLoaded: function (engineInitializer) {
              engineInitializer.initializeEngine({
                renderer: useHtml ? "html" : "canvaskit"
              }).then(function (appRunner) {
                appRunner.runApp();
              });
            }
          });
        });
    </script>
</head>
<body>
<!-- Flutter injects canvas/app here -->
</body>
</html>
